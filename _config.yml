# Site settings
title: Sreenath M Menon
lang: en
email: zreenathmenon@gmail.com
description: >-
  Staff Software Engineer (14+ years). Creator of llmswap (41K+ downloads).
  Building open-source AI tools, agents, and infrastructure.
baseurl: ""
url: "https://sreenathmenon.com"
github_username: sreenathmmenon
linkedin_username: sreenathmmenon

# SEO / jekyll-seo-tag
author:
  name: Sreenath M Menon
  email: zreenathmenon@gmail.com
twitter:
  card: summary_large_image
logo: /assets/favicon.svg
social:
  name: Sreenath M Menon
  links:
    - https://github.com/sreenathmmenon
    - https://www.linkedin.com/in/sreenathmmenon

# Homepage hero + content (used by _layouts/home.html)
hero:
  eyebrow: "Staff Software Engineer · IBM · Bengaluru"
  headline: "Sreenath M Menon"
  lede: >-
    I'm a staff software engineer with 14+ years building enterprise software and open-source AI
    tools, lately safe and auditable autonomous systems. I created llmswap (41K+ downloads), placed
    Top 15 of 70,000+ at the Meta × Hugging Face × PyTorch hackathon, and build AI agents and
    developer tooling. I'm currently a staff engineer at IBM.
focus:
  - Applied AI & Agents
  - Product Engineering
  - Cloud Infrastructure
  - MCP & RAG
  - Distributed Systems
about_blurb: >-
  I started with bash and grep in 2011, moved into cloud infrastructure when OpenStack was new, and
  now work at the seam between natural language and systems, building safe, auditable autonomous
  systems where every action is signed, every budget enforced, and every decision reversible. I care
  about reliable software, good developer experience, and tools that earn a place in someone's daily
  workflow. Based in Bengaluru.

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap   # auto-generates /sitemap.xml on every build (for Google Search Console)
  - jekyll-seo-tag

# Navigation
header_pages:
  - labs.md
  - til.md
  - blog.md
  - about.md

# Collections for TIL posts and Blog
collections:
  til:
    output: true
    permalink: /:collection/:name/
  blog:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope: { path: "" }
    values:
      image: /assets/images/sreenath.jpg
  - scope:
      path: ""
      type: "til"
    values:
      layout: "post"
      author: "Sreenath M Menon"
  - scope:
      path: ""
      type: "blog"
    values:
      layout: "post"
      author: "Sreenath M Menon"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - previews/
  - _templates/
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/