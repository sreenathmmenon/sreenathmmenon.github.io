- name: Asha Sahayak
  featured: true
  blurb: >-
    An RL environment for AI-assisted clinical triage for India's 1.07M frontline ASHA health
    workers. Multi-agent, adaptive curriculum, GRPO-trained to 0.947 peak reward. Built for the
    Meta × Hugging Face × PyTorch hackathon — Top 15 of 70,000+.
  stack: [Python, OpenEnv, "GRPO · Qwen3"]
  links:
    - { label: GitHub, url: "https://github.com/sreenathmmenon/asha-sahayak" }
