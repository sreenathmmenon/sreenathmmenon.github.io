# Single source of truth for projects. featured:true shows on the homepage; all show on /labs/.

- name: Krelvan
  featured: true
  tagline: The operating system for autonomous work.
  blurb: >-
    You declare intent; Krelvan compiles an agent, signs every action, enforces every budget, and
    audits the proof. Every plugin hot-swappable, every run crash-recoverable, every decision
    human-reversible. Self-hostable, on a signed append-only event-sourced runtime.
  stack: [TypeScript, Next.js, Event-sourced, MCP]
  links:
    - { label: krelvan.com, url: "https://krelvan.com" }
    - { label: GitHub, url: "https://github.com/sreenathmmenon/krelvan" }

- name: llmswap
  featured: true
  blurb: >-
    Provider-agnostic LLM SDK + CLI supporting 11 providers (OpenAI, Anthropic, Gemini,
