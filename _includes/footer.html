<footer class="site-footer">
  <div class="container">
    <span class="copy">© {{ 'now' | date: "%Y" }} {{ site.title | escape }} · Tea, terminals, and troubleshooting since 2011.</span>
    <div class="socials">
      <a href="mailto:{{ site.email }}">Email</a>
      {%- if site.linkedin_username %}<a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener">LinkedIn</a>{% endif -%}
      {%- if site.github_username %}<a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>{% endif -%}
    </div>
  </div>
</footer>

<script>
  // reveal-on-scroll (CSS handles reduced-motion)
  (function(){
    var els = document.querySelectorAll('.reveal');
    if(!('IntersectionObserver' in window) || !els.length){ els.forEach(function(e){e.classList.add('in');}); return; }
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold:.1 });
    els.forEach(function(e){ io.observe(e); });
  })();
</script>
