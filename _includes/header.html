<nav class="nav" role="banner">
  <div class="container">
    <a class="brand" href="{{ '/' | relative_url }}"><span class="dot" aria-hidden="true"></span>{{ site.title | escape }}</a>

    <div class="nav-links" id="nav-links">
      {%- assign page_paths = site.header_pages -%}
      {%- for path in page_paths -%}
        {%- assign my_page = site.pages | where: "path", path | first -%}
        {%- if my_page.title -%}
          <a href="{{ my_page.url | relative_url }}">{{ my_page.nav_title | default: my_page.title | escape }}</a>
        {%- endif -%}
      {%- endfor -%}
    </div>

    <div class="nav-right">
      <a class="nav-cta" href="mailto:{{ site.email }}">Get in touch</a>
      <button class="theme-toggle" type="button" aria-label="Toggle dark / light theme" onclick="toggleTheme()">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button class="nav-toggle" type="button" aria-label="Open menu" onclick="document.getElementById('nav-links').classList.toggle('open')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
  </div>
</nav>

<script>
  function toggleTheme(){
    var root = document.documentElement;
    var current = root.getAttribute('data-theme');
    if(!current){
      // no explicit choice yet → derive from what's actually showing
      current = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    var next = current === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try{ localStorage.setItem('theme', next); }catch(e){}
  }
</script>
