---
layout: default
---
<article class="page container">
  <header class="page-header reveal">
    <span class="eyebrow">{{ page.eyebrow | default: page.title }}</span>
    <h1>{{ page.title }}</h1>
    {%- if page.subtitle %}<p class="meta">{{ page.subtitle }}</p>{% endif -%}
  </header>
  <div class="prose reveal{% if page.rich %} prose-rich{% endif %}">
    {{ content }}
  </div>
</article>
